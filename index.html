<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Meme Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="boddy__wrapper">
        <div class="wrapper">
            <div class="slider__wrapper">
                <div class="slider">
                    <input type="radio" name="radio-btn" id="btn0" checked>
                    <input type="radio" name="radio-btn" id="btn1">
                    <input type="radio" name="radio-btn" id="btn2">
                    <input type="radio" name="radio-btn" id="btn3">
                    <input type="radio" name="radio-btn" id="btn4">
                    <input type="radio" name="radio-btn" id="btn5">
                    <input type="radio" name="radio-btn" id="btn6">
                    <input type="radio" name="radio-btn" id="btn7">
    
                    <div class="img">
                        <img src="src\img\mem0.jpg" alt="mem0">
                    </div>
                    <div class="img">
                        <img src="src\img\mem1.jpg" alt="mem1">
                    </div>
                    <div class="img">
                        <img src="src\img\mem2.jpg" alt="mem2">
                    </div>
                    <div class="img">
                        <img src="src\img\mem3.jpg" alt="mem3">
                    </div>
                    <div class="img">
                        <img src="src\img\mem4.jpg" alt="mem4">
                    </div>
                    <div class="img">
                        <img src="src\img\mem5.jpg" alt="mem5">
                    </div>
                    <div class="img">
                        <img src="src\img\mem6.jpg" alt="mem6">
                    </div>
                    <div class="img">
                        <img src="src\img\mem7.jpg" alt="mem7">
                    </div>
                </div>
            </div>
            <div class="context_wrapper">
                <div class="phrases">
                </div>
                <div class="buttons">
                    <div class="btn-wrapper">
                        <label for="btn0" class="pagination"></label>
                    </div>
                    <div class="btn-wrapper">
                        <label for="btn1" class="pagination"></label>
                    </div>
                    <div class="btn-wrapper">
                        <label for="btn2" class="pagination"></label>
                    </div>
                    <div class="btn-wrapper">
                        <label for="btn3" class="pagination"></label>
                    </div>
                    <div class="btn-wrapper">
                        <label for="btn4" class="pagination"></label>
                    </div>
                    <div class="btn-wrapper">
                        <label for="btn5" class="pagination"></label>
                    </div>
                    <div class="btn-wrapper">
                        <label for="btn6" class="pagination"></label>
                    </div>
                    <div class="btn-wrapper">
                        <label for="btn7" class="pagination"></label>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
